<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/checkout2.css">
</head>
<body>
    <header class="header">
       <a href="amazonproj.html">
        <img src="images/amazon-logo.checkout.png" alt="no" class="amazonlogo">
       </a>
        <p class="checkout">Checkout(<span class="item3">3items</span>)</p>
        <img src="images/checkout-lock-icon.png" alt="no" class="lock">
    </header>
    <main>
        <p class="review">Review your order</p>
        <p class="text">Your cart is empty</p>
        <a href="amazonproj.html">
        <button class="view">View products</button>
        </a>
        <div class="div4">
            <p class="order">Order Summary</p>
            
            <p>items(3):<span class="span1">$0.00</span></p>
            <p class="ship">Shipping & handling:<span class="span2">$0.00</span></p>
            <p>Total before tax:<span class="span3">$0.00</span></p>
            <p class="estimated">Estimated tax (10%):<span class="span4">$0.00</span></p>
            <div class="border"></div>
            <p class="total">Order total:<span class="span5">$0.00</span></p>
            <a href="ordersmy.html">
            <button class="button">Place your order</button>
            </a>

        </div>
    </main>
    
</body>
</html>
